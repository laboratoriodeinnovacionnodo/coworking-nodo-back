name: CI/CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Deploy en Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop coworking-back || true
            docker rm coworking-back || true
            docker run --rm \
              --network red_interna \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              ghcr.io/${{ github.repository }}:latest \
              npx prisma migrate deploy
            docker run -d \
              --name coworking-back \
              --restart always \
              --network red_interna \
              -p 3550:3550 \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}" \
              -e PORT="${{ secrets.PORT }}" \
              ghcr.io/${{ github.repository }}:latest